<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Attendance Link Expired | BCA STORE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
        color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .error-card {
      text-align: center;
      max-width: 560px;
      padding: 40px;
      z-index: 10;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 950;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 20px;
    }
    .error-title {
      font-size: 2rem;
      margin-bottom: 16px;
      font-weight: 800;
    }
    .error-msg {
      color: #475569;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-wrap {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <h1 class="error-title">Attendance Link Expired</h1>
    <p class="error-msg">This temporary attendance link is no longer active. Please ask your teacher for a fresh link and submit again before expiry.</p>
    <div class="btn-wrap">
      <a href="index.html" class="btn-primary" style="text-decoration:none;">Back to Home</a>
      <a href="attendance/" class="btn-outline" style="text-decoration:none; color:#0f172a; border-color:#bfdbfe;">Open Attendance Page</a>
    </div>
  </div>
</body>
</html>
