<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | BCA Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-100 px-4 text-slate-900">
  <div class="w-full max-w-xl rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-xl shadow-blue-100/70 sm:p-12">
    <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-blue-50 text-4xl text-blue-600">404</div>
    <h1 id="errorTitle" class="mt-6 text-3xl font-bold text-slate-900">Page Not Found</h1>
    <p id="errorMessage" class="mt-3 text-sm leading-6 text-slate-600">The page you requested is not available right now.</p>
    <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
      <a href="/index.html" class="rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700">Back to Home</a>
      <a href="/semester.html?sem=1" class="rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:border-blue-500 hover:text-blue-600">Browse Subjects</a>
    </div>
  </div>

  <script>
    const state = sessionStorage.getItem("attendance404State");
    if (state === "expired" || state === "inactive") {
      document.getElementById("errorTitle").textContent = "404 - Attendance Link Expired";
      document.getElementById("errorMessage").textContent = "This attendance link has expired and can no longer accept submissions.";
    } else if (state === "missing") {
      document.getElementById("errorTitle").textContent = "404 - Attendance Link Not Found";
      document.getElementById("errorMessage").textContent = "The attendance link is missing or invalid.";
    }
    sessionStorage.removeItem("attendance404State");
  </script>
</body>
</html>
